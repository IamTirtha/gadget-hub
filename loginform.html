<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login- Gadget Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./styles/tailwind.css">
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-full max-w-sm">
        <h2 class="text-2xl font-bold text-white text-center mb-6">Login to Gadget Hub</h2>
    <!-- Form -->
        <form class="space-y-4">
        <!-- Email -->
        <div>
            <label class="block text-gray-300 mb-1">Email</label>
            <input id="input-email" type="email" placeholder="Enter your email"
            class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <!-- Password -->
        <div>
            <label class="block text-gray-300 mb-1">Password</label>
            <input id="input-password" type="password" placeholder="Enter your password"
            class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- error message -->
            <p id="error-msg" class="hidden text-red-500">Invalid information</p>


        <!-- Buttons -->
        <div class="flex justify-between gap-4 mt-6">
            <button type="button" id="login-btn"
            class="w-1/2 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg transition">
            Login
            </button>

            <button type="button" id="cancel-btn"
            class="w-1/2 bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg transition">
            Cancel
            </button>

        </div>

        </form>
    </div>
    
    <script src="./js/login.js"></script>
</body>
</html>
