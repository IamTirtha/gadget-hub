<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontpage</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./styles/tailwind.css">
</head>
    <body class="bg-gray-950 text-white font-sans">
    <!-- Navbar -->
    <nav class="flex justify-between items-center px-8 py-4 border-b border-gray-800">
        
        <!-- Logo -->
        <div class="flex items-center gap-2">
        <div class="bg-blue-500 p-2 rounded-lg shadow-lg">
            <!-- Simple gadget icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9.75 3v2.25M14.25 3v2.25M4.5 7.5h15M6.75 7.5v10.5a2.25 2.25 0 002.25 2.25h6a2.25 2.25 0 002.25-2.25V7.5" />
            </svg>
        </div>
        <h1 class="text-2xl font-bold tracking-wide text-blue-400">Gadget Hub</h1>
        </div>

        <!-- Buttons -->
        <div class="flex gap-4">
        <button id="login-btn" class="px-4 py-2 border border-blue-500 rounded-lg hover:bg-blue-500 hover:text-white transition">
            Log In
        </button>
        <button id="signin-btn" class="px-4 py-2 bg-blue-500 rounded-lg hover:bg-blue-600 transition shadow-lg">
            Sign In
        </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="flex flex-col justify-center items-center text-center h-[80vh] px-4">
        
        <h2 class="text-4xl md:text-6xl font-extrabold mb-6">
        Welcome to <span class="text-blue-500">Gadget Hub</span>
        </h2>

        <p class="text-gray-400 max-w-xl mb-8">
        Your ultimate destination for the latest tech gadgets, reviews, and innovations. 
        Discover, explore, and stay ahead in the world of technology.
        </p>

        <!-- CTA Buttons -->
        <div class="flex flex-col sm:flex-row gap-4">
        <button class="px-6 py-3 bg-blue-500 rounded-xl text-lg font-semibold hover:bg-blue-600 transition shadow-xl">
            Get Started
        </button>
        <button class="px-6 py-3 border border-gray-600 rounded-xl text-lg hover:border-blue-500 hover:text-blue-400 transition">
            Explore Gadgets
        </button>
        </div>

    </section>

    <!-- Footer -->
    <footer class="text-center py-4 border-t border-gray-800 text-gray-500 text-sm">
        © 2026 Gadget Hub. All rights reserved.
    </footer>

    <script>
        const logInButton=document.getElementById("login-btn")
        const signInButton=document.getElementById("signin-btn")

        logInButton.addEventListener("click" , function(){
            window.location.href="loginform.html"
        })

        signInButton.addEventListener("click" , function(){
            window.location.href="signinform.html"
        })
    </script>

    </body>
</html>
