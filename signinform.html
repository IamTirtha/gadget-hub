<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signin Form</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./styles/tailwind.css">
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

    <!-- Sign Up Card -->
    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-full max-w-md">
        
        <h2 class="text-2xl font-bold text-white text-center mb-6">
        Create Account
        </h2>

        <!-- Form -->
        <form action="auth/register.php" method="POST" class="space-y-4">

        <!-- Name -->
        <div>
            <label class="block text-gray-300 mb-1">Full Name</label>
            <input name="name" type="text" placeholder="Enter your name"
            class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>

        <!-- Email -->
        <div>
            <label class="block text-gray-300 mb-1">Email</label>
            <input id="sign-input-email" name="email" type="email" placeholder="Enter your email"
            class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>

        <!-- Password -->
        <div>
            <label class="block text-gray-300 mb-1">Password</label>
            <input id="sign-input-password" name="password" type="password" placeholder="Create password"
            class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>

        <!-- Confirm Password -->
        <div>
            <label class="block text-gray-300 mb-1">Confirm Password</label>
            <input id="sign-input-confirm-password" name="confirm_password" type="password" placeholder="Confirm password"
            class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>

        <p id="register-error-msg" class="hidden text-red-500">Registration failed.</p>

        <!-- Buttons -->
        <div class="flex justify-between gap-4 mt-6">

            <button type="submit" id="signup-btn"
            class="w-1/2 bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg transition">
            Sign Up
            </button>

            <button type="button" id="sign-cancel-btn"
            class="w-1/2 bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg transition">
            Cancel
            </button>

        </div>

        </form>

        <!-- Login Redirect -->
        <p class="text-gray-400 text-sm text-center mt-4">
        Already have an account?
        <a href="loginform.html" class="text-blue-400 hover:underline">Login</a>
        </p>

    </div>

    <script src="./js/signin.js"></script>
    </body>
</html>
