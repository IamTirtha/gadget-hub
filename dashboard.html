<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./styles/tailwind.css">
    <!-- Glow effect -->
    <style>
        .glow {
        text-shadow: 0 0 8px #3b82f6, 0 0 16px #3b82f6;
        }
    </style>
</head>

    <body class="bg-gray-900 text-white">

    <!-- ================= NAVBAR ================= -->
    <nav class="bg-gray-800 p-4 flex items-center justify-between flex-wrap">

        <!-- Logo -->
        <div class="text-xl font-bold leading-tight">
        Gadget <br>
        <span class="glow text-blue-400">HUB</span>
        </div>

        <!-- Search Bar -->
        <div class="w-full md:w-1/2 my-3 md:my-0">
        <input type="text" placeholder="Search gadgets..."
            class="w-full px-4 py-2 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Right Section -->
        <div class="flex items-center gap-4">

        <!-- Cart -->
        <div class="text-2xl cursor-pointer">
            🛒
        </div>

        <!-- Logout -->
        <div onclick="document.getElementById('logout-btn').addEventListener('dblclick',function(){
            localStorage.setItem('isLoggedOut','true')
            window.location.href='index.html'
        })">
            <button id="logout-btn" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg">
            Logout
            </button>
        </div>
        

        </div>

    </nav>


    <!-- ================= BANNERS ================= -->
    <section class="p-6 grid gap-4 md:grid-cols-2 lg:grid-cols-4">

        <div class="bg-blue-600 p-6 rounded-xl text-center font-bold">
        🔥 Big Sale - Up to 50% Off
        </div>

        <div class="bg-purple-600 p-6 rounded-xl text-center font-bold">
        🚀 New Arrivals
        </div>

        <div class="bg-green-600 p-6 rounded-xl text-center font-bold">
        💻 Accessories Combo Deals
        </div>

        <div class="bg-pink-600 p-6 rounded-xl text-center font-bold">
        🎧 Top Rated Gadgets
        </div>

    </section>


    <!-- ================= PRODUCTS ================= -->
    <section class="p-6">

        <h2 class="text-2xl font-bold mb-6">Products</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

        <!-- Card -->
        <div class="bg-gray-800 rounded-xl p-4 shadow-lg">
            <img src="https://via.placeholder.com/300"
            class="rounded-lg mb-4 w-full">
            <h3 class="text-lg font-semibold">Wireless Headphones</h3>
            <p class="text-gray-400">$99</p>
            <button class="mt-3 w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-lg">
            Add to Cart
            </button>
        </div>

        <!-- Card -->
        <div class="bg-gray-800 rounded-xl p-4 shadow-lg">
            <img src="https://via.placeholder.com/300"
            class="rounded-lg mb-4 w-full">
            <h3 class="text-lg font-semibold">Smart Watch</h3>
            <p class="text-gray-400">$149</p>
            <button class="mt-3 w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-lg">
            Add to Cart
            </button>
        </div>

        <!-- Card -->
        <div class="bg-gray-800 rounded-xl p-4 shadow-lg">
            <img src="https://via.placeholder.com/300"
            class="rounded-lg mb-4 w-full">
            <h3 class="text-lg font-semibold">Gaming Mouse</h3>
            <p class="text-gray-400">$49</p>
            <button class="mt-3 w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-lg">
            Add to Cart
            </button>
        </div>

        </div>

    </section>


    <!-- ================= MORE SECTION ================= -->
    <section class="p-6 bg-gray-800 mt-6">

        <h2 class="text-xl font-bold mb-4">Why Shop With Us?</h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

        <div class="p-4 bg-gray-700 rounded-lg text-center">
            ⚡ Fast Delivery
        </div>

        <div class="p-4 bg-gray-700 rounded-lg text-center">
            🔒 Secure Payment
        </div>

        <div class="p-4 bg-gray-700 rounded-lg text-center">
            ⭐ Top Quality Products
        </div>

        </div>

    </section>


    <!-- ================= FOOTER ================= -->
    <footer class="bg-gray-900 p-6 text-center text-gray-400">
        © 2026 Gadget Hub. All rights reserved.
    </footer>

    </body>
</html>
